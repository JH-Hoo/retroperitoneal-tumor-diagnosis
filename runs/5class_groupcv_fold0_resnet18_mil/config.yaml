task: 5class_groupcv_fold0
seed: 20260703

data:
  label_csv: data/labels/labels_5class.csv
  split_dir: data/labels/splits/fold_0
  tensor_dir: data/cache_96slice/tensors

model:
  backbone: resnet18
  pretrained: imagenet
  pooling: attention_mil
  num_classes: 5

preprocess:
  num_slices: 96
  image_size: 224
  windows:
    soft_tissue: [-160, 240]
    fat_sensitive: [-200, 100]
    wide_abdomen: [-200, 400]

train:
  epochs: 12
  batch_size: 1
  head_lr: 0.0003
  layer4_lr: 0.00001
  weight_decay: 0.0001
  freeze_backbone_epochs: 5

output:
  run_dir: runs/5class_groupcv_fold0_resnet18_mil
